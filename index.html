<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>STEM Оптика: Конструктор</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #020617; color: white; margin: 0; overflow: hidden; display: flex; }
        #toolbar { width: 280px; background: #0f172a; padding: 20px; border-right: 1px solid #1e293b; z-index: 10; display: flex; flex-direction: column; gap: 10px; }
        #canvas-container { flex: 1; position: relative; background: black; }
        canvas { display: block; }
        
        .stat-box { background: #1e293b; padding: 12px; border-radius: 8px; border: 1px solid #334155; }
        b { color: #fbbf24; }
        
        /* Бутони за инвентар */
        .inventory-item { 
            background: #1e293b; color: white; border: 1px solid #475569; 
            padding: 12px; border-radius: 8px; cursor: pointer; text-align: left;
            transition: 0.2s; display: flex; align-items: center; gap: 10px;
        }
        .inventory-item:hover { background: #334155; border-color: #3b82f6; }
        .icon { width: 20px; height: 20px; border-radius: 2px; }

        button.reset { background: #ef4444; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: auto; }
        .instruction { font-size: 11px; color: #94a3b8; line-height: 1.4; margin-top: 10px; }
    </style>
</head>
<body>

<div id="toolbar">
    <h2>🔭 Оптика Лаб</h2>
    <div class="stat-box">Статус: <b id="status">ИЗКЛЮЧЕНО</b></div>
    
    <p style="font-size: 14px; margin: 10px 0 5px;">Добави елементи:</p>
    <div class="inventory-item" onclick="addMirror('flat')">
        <div class="icon" style="background: white;"></div> Плоско огледало
    </div>
    <div class="inventory-item" onclick="addMirror('concave')">
        <div class="icon" style="background: #60a5fa; border-radius: 50% 0 0 50%;"></div> Вдлъбнато
    </div>
    <div class="inventory-item" onclick="addMirror('convex')">
        <div class="icon" style="background: #f472b6; border-radius: 0 50% 50% 0;"></div> Изпъкнало
    </div>

    <div class="instruction">
        • Кликни върху бутон, за да добавиш огледало.<br>
        • <b>Влачи</b> за местене, <b>Скрол</b> за въртене.<br>
        • Посочи огледало, за да видиш <b>осите и ъглите</b>.
    </div>

    <button class="reset" onclick="mirrors = []; target.active=false;">Изчисти сцената</button>
</div>

<div id="canvas-container">
    <canvas id="opticsCanvas"></canvas>
</div>
