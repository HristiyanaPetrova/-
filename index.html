<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>STEM Оптика: Сферични огледала</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #020617; color: white; margin: 0; overflow: hidden; display: flex; }
        #toolbar { width: 260px; background: #0f172a; padding: 20px; border-right: 1px solid #1e293b; z-index: 10; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        #canvas-container { flex: 1; position: relative; background: black; }
        canvas { display: block; }
        .stat-box { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #334155; }
        b { color: #fbbf24; }
        .instruction { font-size: 12px; color: #94a3b8; line-height: 1.5; border-top: 1px solid #334155; pt: 10px; }
        button { background: #3b82f6; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .type-tag { font-size: 10px; padding: 2px 5px; border-radius: 4px; margin-left: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="toolbar">
    <h2>🔭 Оптика Лаб 2.0</h2>
    <div class="stat-box">Статус: <b id="status">ИЗКЛЮЧЕНО</b></div>
    
    <div style="font-size: 13px; margin-bottom: 10px; color: #94a3b8;">Легенда на огледалата:</div>
    <div style="font-size: 12px; margin-bottom: 5px;">⬜ Плоско (стандартно)</div>
    <div style="font-size: 12px; margin-bottom: 5px; color: #60a5fa;">🔵 Вдлъбнато (събирателно)</div>
    <div style="font-size: 12px; margin-bottom: 15px; color: #f472b6;">🔴 Изпъкнало (разсейвателно)</div>

    <button onclick="resetLevel()">Нулирай позиция</button>
    
    <p class="instruction">
        • <b>Влачи</b> огледалата за местене.<br>
        • <b>Скролвай</b> върху тях за въртене.<br>
        • Наблюдавай как <b>кривината</b> променя фокуса на светлината.
    </p>
</div>

<div id="canvas-container">
    <canvas id="opticsCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('opticsCanvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let mirrors = [
        { x: 300, y: 400, angle: 45, length: 80, type: 'flat', isDragging: false },
        { x: 500, y: 200, angle: 160, length: 100, type: 'concave', curvature: 0.05, isDragging: false },
        { x: 700, y: 450, angle: -30, length: 100, type: 'convex', curvature: 0.05, isDragging: false }
    ];
    
    const source = { x: 50, y: height/2 || 300, angle: 0 };
    const target = { x: 850, y: 300, radius: 30, active: false };
    
    let selectedMirror = null;

    function init() {
        width = window.innerWidth - 260;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        source.y = height / 2;
        target.x = width - 100;
        target.y = height / 2;
        draw();
    }

    function draw() {
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, width, height);

        // Рисуване на Целта
        if (target.active) {
            // Ефект на сияние
            let grd = ctx.createRadialGradient(target.x, target.y, 5, target.x, target.y, 80);
            grd.addColorStop(0, 'rgba(251, 191, 36, 0.6)');
            grd.addColorStop(1, 'transparent');
            ctx.fillStyle = grd;
            ctx.fillRect(target.x - 80, target.y - 80, 160, 160);
        }

        ctx.beginPath();
        ctx.arc(target.x, target.y, target.radius, 0, Math.PI * 2);
        ctx.fillStyle = target.active ? '#fbbf24' : '#422006';
        ctx.fill();
        ctx.strokeStyle = target.active ? '#fff' : '#fbbf24';
        ctx.lineWidth = target.active ? 5 : 2;
        ctx.stroke();

        // Рисуване на огледалата
        mirrors.forEach(m => {
            ctx.save();
            ctx.translate(m.x, m.y);
            ctx.rotate(m.angle * Math.PI / 180);
            
            ctx.lineWidth = 4;
            if (m.type === 'flat') ctx.strokeStyle = '#fff';
            else if (m.type === 'concave') ctx.strokeStyle = '#60a5fa';
            else ctx.strokeStyle = '#f472b6';

            ctx.beginPath();
            if (m.type === 'flat') {
                ctx.moveTo(-m.length/2, 0);
                ctx.lineTo(m.length/2, 0);
            } else {
                // Рисуване на дъга за сферични огледала
                let sign = m.type === 'concave' ? 1 : -1;
                ctx.arc(0, m.length * 1.5 * sign, m.length * 1.5, -Math.PI/2 - 0.4 * sign, -Math.PI/2 + 0.4 * sign);
            }
            ctx.stroke();
            ctx.restore();
        });

        traceBeam();
        requestAnimationFrame(draw);
    }

    function traceBeam() {
        let currentX = source.x;
        let currentY = source.y;
        let currentAngle = source.angle;
        target.active = false;

        ctx.beginPath();
        ctx.moveTo(currentX, currentY);
        ctx.strokeStyle = '#60a5fa';
        ctx.lineWidth = 3;
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#60a5fa';

        for (let i = 0; i < 8; i++) {
            let nextX = currentX + Math.cos(currentAngle * Math.PI / 180) * 2000;
            let nextY = currentY + Math.sin(currentAngle * Math.PI / 180) * 2000;

            let closestHit = null;
            let minDist = Infinity;

            mirrors.forEach(m => {
                let hit = intersect(currentX, currentY, nextX, nextY, m);
                if (hit && hit.dist < minDist) {
                    minDist = hit.dist;
                    closestHit = hit;
                }
            });

            // Проверка за целта
            let distToTarget = circleIntersect(currentX, currentY, nextX, nextY, target);
            if (distToTarget !== null && distToTarget < minDist) {
                ctx.lineTo(currentX + Math.cos(currentAngle * Math.PI / 180) * distToTarget, 
                           currentY + Math.sin(currentAngle * Math.PI / 180) * distToTarget);
                target.active = true;
                break;
            }

            if (closestHit) {
                ctx.lineTo(closestHit.x, closestHit.y);
                currentX = closestHit.x;
                currentY = closestHit.y;
                
                // Физика за сферично отражение: променяме ъгъла спрямо точката на допир върху дъгата
                let normalAngle = closestHit.mirrorAngle;
                if (closestHit.type !== 'flat') {
                    // Изчисляваме локалния наклон в точката на удара
                    let hitOffset = closestHit.hitOffset / (closestHit.length / 2); // от -1 до 1
                    let curveEffect = closestHit.type === 'concave' ? -20 : 20;
                    normalAngle += hitOffset * curveEffect;
                }
                
                currentAngle = 2 * normalAngle - currentAngle;
            } else {
                ctx.lineTo(nextX, nextY);
                break;
            }
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
        document.getElementById('status').innerText = target.active ? "ОСВЕТЕНА! ✨" : "ОПИТАЙ ПАК";
        document.getElementById('status').style.color = target.active ? "#fbbf24" : "#ef4444";
    }

    function intersect(x1, y1, x2, y2, m) {
        const angleRad = m.angle * Math.PI / 180;
        const cosA = Math.cos(angleRad);
        const sinA = Math.sin(angleRad);
        
        // Линейна апроксимация на огледалото за детекция на сблъсък
        const x3 = m.x - cosA * m.length / 2;
        const y3 = m.y - sinA * m.length / 2;
        const x4 = m.x + cosA * m.length / 2;
        const y4 = m.y + sinA * m.length / 2;

        const den = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
        if (den === 0) return null;

        const t = ((x1 - x3) * (y3 - y4) - (y1 - y3) * (x3 - x4)) / den;
        const u = -((x1 - x2) * (y1 - y3) - (y1 - y2) * (x1 - x3)) / den;

        if (t > 0 && t < 1 && u > 0 && u < 1) {
            // Изчисляваме колко далеч от центъра на огледалото е удара
            let hitX = x1 + t * (x2 - x1);
            let hitY = y1 + t * (y2 - y1);
            let hitOffset = Math.sqrt(Math.pow(hitX - m.x, 2) + Math.pow(hitY - m.y, 2));
            // Проверка на коя страна е (ляво/дясно от центъра)
            let dot = (hitX - m.x) * cosA + (hitY - m.y) * sinA;
            if (dot < 0) hitOffset = -hitOffset;

            return { x: hitX, y: hitY, dist: Math.sqrt(Math.pow(t * (x2-x1),2) + Math.pow(t * (y2-y1),2)), mirrorAngle: m.angle, type: m.type, length: m.length, hitOffset: hitOffset };
        }
        return null;
    }

    function circleIntersect(x1, y1, x2, y2, c) {
        let dx = x2 - x1, dy = y2 - y1;
        let fx = x1 - c.x, fy = y1 - c.y;
        let a = dx*dx + dy*dy, b = 2*(fx*dx + fy*dy), c_val = (fx*fx + fy*fy) - c.radius*c.radius;
        let disc = b*b - 4*a*c_val;
        if (disc >= 0) {
